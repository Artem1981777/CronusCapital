<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <!-- Background -->
  <rect width="800" height="400" fill="#0B0F19"/>
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0070f3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ffa3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0070f3;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#00ffa3;stop-opacity:0.2" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Tech Grid Background Line -->
  <path d="M 0,100 L 800,100 M 0,200 L 800,200 M 0,300 L 800,300 M 200,0 L 200,400 M 400,0 L 400,400 M 600,0 L 600,400" stroke="#1E293B" stroke-width="1"/>

  <!-- Title -->
  <text x="50%" y="70" text-anchor="middle" fill="url(#grad1)" font-family="Segoe UI, sans-serif" font-weight="bold" font-size="32" filter="url(#glow)">🏛️ CRONUS CAPITAL</text>
  <text x="50%" y="100" text-anchor="middle" fill="#94A3B8" font-family="Segoe UI, sans-serif" font-size="16">Autonomous ArcOSS Multi-Agent Intelligence System</text>

  <!-- Connecting Arrows -->
  <path d="M 230,220 L 310,220" stroke="url(#grad1)" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M 490,220 L 570,220" stroke="url(#grad1)" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <!-- Agent 1: Scout -->
  <rect x="50" y="160" width="180" height="120" rx="15" fill="#111827" stroke="#334155" stroke-width="2"/>
  <text x="140" y="195" text-anchor="middle" fill="#0070f3" font-family="Segoe UI, sans-serif" font-weight="bold" font-size="18">🔍 SCOUT</text>
  <text x="140" y="225" text-anchor="middle" fill="#94A3B8" font-family="Segoe UI, sans-serif" font-size="12">Scans Markets</text>
  <text x="140" y="245" text-anchor="middle" fill="#64748B" font-family="Segoe UI, sans-serif" font-size="11">Polymarket Alpha</text>

  <!-- Agent 2: Analyst -->
  <rect x="310" y="140" width="180" height="150" rx="15" fill="#111827" stroke="url(#grad1)" stroke-width="2" filter="url(#glow)"/>
  <rect x="310" y="140" width="180" height="150" rx="15" fill="url(#grad2)"/>
  <text x="400" y="180" text-anchor="middle" fill="#ffffff" font-family="Segoe UI, sans-serif" font-weight="bold" font-size="20">📊 ANALYST</text>
  <text x="400" y="215" text-anchor="middle" fill="#00ffa3" font-family="Segoe UI, sans-serif" font-size="13">Computes EV</text>
  <text x="400" y="240" text-anchor="middle" fill="#94A3B8" font-family="Segoe UI, sans-serif" font-size="12">USDC Risk Sizing</text>
  <text x="400" y="265" text-anchor="middle" fill="#64748B" font-family="Segoe UI, sans-serif" font-size="11">Claude 3.5 Sonnet</text>

  <!-- Agent 3: Executor -->
  <rect x="570" y="160" width="180" height="120" rx="15" fill="#111827" stroke="#334155" stroke-width="2"/>
  <text x="660" y="195" text-anchor="middle" fill="#ff4d4d" font-family="Segoe UI, sans-serif" font-weight="bold" font-size="18">⚡ EXECUTOR</text>
  <text x="660" y="225" text-anchor="middle" fill="#94A3B8" font-family="Segoe UI, sans-serif" font-size="12">Arc Testnet Tx</text>
  <text x="660" y="245" text-anchor="middle" fill="#64748B" font-family="Segoe UI, sans-serif" font-size="11">viem / x402 Keys</text>

  <!-- Footer Tags -->
  <rect x="230" y="340" width="100" height="30" rx="8" fill="#1E293B"/>
  <text x="280" y="360" text-anchor="middle" fill="#94A3B8" font-family="Segoe UI, sans-serif" font-size="12">React Mode</text>

  <rect x="350" y="340" width="100" height="30" rx="8" fill="#1E293B"/>
  <text x="400" y="360" text-anchor="middle" fill="#00ffa3" font-family="Segoe UI, sans-serif" font-size="12">Arc Network</text>

  <rect x="470" y="340" width="100" height="30" rx="8" fill="#1E293B"/>
  <text x="520" y="360" text-anchor="middle" fill="#94A3B8" font-family="Segoe UI, sans-serif" font-size="12">Standalone</text>
</svg>
