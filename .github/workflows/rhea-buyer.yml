name: rhea-buyer
on:
  schedule:
    - cron: "43 6,14 * * *"
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Rhea negotiates and buys
        env:
          RHEA_PRIVATE_KEY: ${{ secrets.RHEA_PRIVATE_KEY }}
          ARC_RPC: https://rpc.blockdaemon.testnet.arc.network
        run: node scripts/rhea-agent.mjs
      - name: Commit m2m ledger
        run: |
          git config user.name "rhea-agent"
          git config user.email "actions@github.com"
          git add m2m-ledger
          git diff --cached --quiet || git commit -m "m2m: Rhea trade ledger entry"
          git pull --rebase origin main
          git push
